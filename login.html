<!DOCTYPE html>
<html lang="kr">

<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f6c4282fea.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Clone</title>
</head>

<body>
    <div class="main-container main-cotainer__login">
        <div class="login-header">
            <a href="#"><i class="fa-solid fa-gear"></i></a>
            <a href="#"> <i class="fa-solid fa-minus"></i></a>
            <a href="#"><i class="fa-solid fa-xmark"></i></a>
        </div>
        <div class="login-logo">
            <i class="fa-solid fa-comment"></i>
            <span>TALK</span>
        </div>
        <div class="login-forms">
            <form>
                <input type="email" placeholder="Email or Phone number" required>
                <input type="password" placeholder="Password" required>
                <button class="login-button">Log in</button>
                <p class="or-line">Or</p>
                <button><i class="fa-solid fa-qrcode"></i> QR Code Log in</button>
                <div class="keep-login">
                    <label class="circle-check">
                        <input type="checkbox">
                        <span><i class="fa-solid fa-check"></i></span>Keep me logged in
                    </label>
                    <a href="#">i</a>
                </div>
            </form>
        </div>
        <div class="find-account">
            <a href="#">Find My Kakao Account</a>
            <span>|</span>
            <a href="#">Reset Password</a>
        </div>
    </div>
    <div id="no-mobile">
        <span>Your screen is too big !.!.!</span>
    </div>
</body>

</html>
